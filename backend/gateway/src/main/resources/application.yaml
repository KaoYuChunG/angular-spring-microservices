server:
  port: 8081

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/study-platform
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://auth:8082        # 轉發到 auth 微服務 (Docker 內部網路)
            predicates:
              - Path=/api/auth/**        # 攔截所有 /api/auth/ 開頭的請求

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
